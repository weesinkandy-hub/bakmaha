<!DOCTYPE html>
<html lang="si">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BAKMAHA - සජීවී අවුරුදු සිතියම</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet-control-geocoder/dist/Control.Geocoder.css" />

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Abhaya+Libre:wght@400;700&display=swap');
        
        body { font-family: 'Abhaya Libre', serif; margin: 0; background: #fff5f5; overflow: hidden; }

        /* Animated Traditional Background */
        .bg-animation {
            position: fixed; width: 100vw; height: 100vh; z-index: -1;
            background: linear-gradient(135deg, #ff9a9e 0%, #fad0c4 100%);
        }
        .liquid {
            position: absolute; width: 500px; height: 500px;
            background: rgba(255, 107, 107, 0.2); filter: blur(100px);
            border-radius: 50%; animation: move 20s infinite alternate;
        }
        @keyframes move { from { transform: translate(-10%, -10%); } to { transform: translate(30%, 30%); } }

        /* Liquid Glass Styling */
        .glass {
            background: rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 20px;
        }

        #map {
            height: calc(100vh - 100px); width: 96%; margin: 0 auto;
            border-radius: 25px; border: 4px solid white;
            box-shadow: 0 10px 40px rgba(0,0,0,0.1);
        }

        /* Form Overlay */
        #formOverlay {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.4); z-index: 1000; justify-content: center; align-items: center;
        }
    </style>
</head>
<body>

    <div class="bg-animation"><div class="liquid"></div></div>

    <header class="p-4 flex justify-between items-center max-w-7xl mx-auto">
        <div class="glass px-6 py-2">
            <h1 class="text-3xl font-bold text-red-600 tracking-widest">BAKMAHA</h1>
        </div>
        <div class="glass px-4 py-2 text-sm font-semibold text-gray-700">
            සිතියම මත ක්ලික් කර උත්සවයක් සලකුණු කරන්න
        </div>
    </header>

    <div id="map"></div>

    <div id="formOverlay">
        <div class="glass p-8 w-96 flex flex-col gap-4 shadow-2xl">
            <h2 class="text-xl font-bold text-center text-gray-800">විස්තර ඇතුළත් කරන්න</h2>
            <input type="text" id="evName" placeholder="උත්සවයේ නම" class="p-3 rounded-lg bg-white/40 border-none outline-none focus:ring-2 ring-red-400">
            <input type="text" id="evLoc" placeholder="ස්ථානය (ගම/නගරය)" class="p-3 rounded-lg bg-white/40 border-none outline-none focus:ring-2 ring-red-400">
            <input type="text" id="evOrg" placeholder="සංවිධානය" class="p-3 rounded-lg bg-white/40 border-none outline-none focus:ring-2 ring-red-400">
            
            <div class="flex gap-2">
                <button onclick="saveData()" class="flex-1 bg-green-500 text-white py-3 rounded-lg font-bold hover:bg-green-600 transition">තොරතුරු තහවුරු කරන්න</button>
                <button onclick="closeForm()" class="bg-gray-400 text-white px-4 rounded-lg">X</button>
            </div>
        </div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://unpkg.com/leaflet-control-geocoder/dist/Control.Geocoder.js"></script>

    <script type="module">
        // Firebase Setup
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, push, onChildAdded, remove } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";
        import { getAnalytics } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-analytics.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDe2zWKPMaVKO4aAH0JGL688Bt8TV_4KcY",
            authDomain: "bakmaha.firebaseapp.com",
            projectId: "bakmaha",
            storageBucket: "bakmaha.firebasestorage.app",
            messagingSenderId: "351917609769",
            appId: "1:351917609769:web:4f1565d766f6efb2d29d38",
            measurementId: "G-44F7VVDBRD"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const analytics = getAnalytics(app);
        const markersRef = ref(db, 'festivals');

        // Map Setup
        var map = L.map('map').setView([7.8731, 80.7718], 8);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', { attribution: 'BAKMAHA' }).addTo(map);

        // Search Tool
        L.Control.geocoder().addTo(map);

        // GPS Auto-locate
        map.locate({setView: true, maxZoom: 13});
        map.on('locationfound', (e) => {
            L.circle(e.latlng, { radius: 200 }).addTo(map);
        });

        let selectedLatLng = null;

        // Click Map to Open Form
        map.on('click', function(e) {
            selectedLatLng = e.latlng;
            document.getElementById('formOverlay').style.display = 'flex';
        });

        // Close Form
        window.closeForm = function() {
            document.getElementById('formOverlay').style.display = 'none';
        }

        // Save to Firebase
        window.saveData = function() {
            const name = document.getElementById('evName').value;
            const loc = document.getElementById('evLoc').value;
            const org = document.getElementById('evOrg').value;

            if(name && loc && org && selectedLatLng) {
                push(markersRef, {
                    name: name,
                    location: loc,
                    org: org,
                    lat: selectedLatLng.lat,
                    lng: selectedLatLng.lng
                });
                closeForm();
                document.getElementById('evName').value = "";
                document.getElementById('evLoc').value = "";
                document.getElementById('evOrg').value = "";
            } else {
                alert("කරුණාකර සියලු විස්තර පුරවන්න!");
            }
        }

        // Render Markers in Real-time for Everyone
        let activeMarkers = {};

        onChildAdded(markersRef, (snapshot) => {
            const data = snapshot.val();
            const key = snapshot.key;

            const marker = L.marker([data.lat, data.lng]).addTo(map);
            const popupBody = `
                <div class="text-center p-2">
                    <h3 class="font-bold text-lg text-red-600">${data.name}</h3>
                    <p class="text-sm"><b>ස්ථානය:</b> ${data.location}</p>
                    <p class="text-sm"><b>සංවිධානය:</b> ${data.org}</p>
                    <hr class="my-2">
                    <button onclick="removeMarker('${key}')" class="text-xs text-red-400 hover:underline">මකා දමන්න</button>
                </div>
            `;
            marker.bindPopup(popupBody);
            activeMarkers[key] = marker;
        });

        // Remove Marker Function
        window.removeMarker = function(key) {
            if(confirm("මෙම සලකුණ ඉවත් කිරීමට අවශ්‍යද?")) {
                const markerRef = ref(db, 'festivals/' + key);
                remove(markerRef).then(() => {
                    map.removeLayer(activeMarkers[key]);
                });
            }
        }
    </script>
</body>
</html>
