<!DOCTYPE html>
<html lang="si">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BAKMAHA - සජීවී අවුරුදු සිතියම</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet-control-geocoder/dist/Control.Geocoder.css" />

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Abhaya+Libre:wght@400;700&display=swap');
        body { font-family: 'Abhaya Libre', serif; margin: 0; background: #fff5f5; scroll-behavior: smooth; }

        /* Animated Traditional Background */
        .bg-animation {
            position: fixed; width: 100vw; height: 100vh; z-index: -1;
            background: linear-gradient(135deg, #ff9a9e 0%, #fad0c4 100%);
        }
        .liquid {
            position: absolute; width: 500px; height: 500px;
            background: rgba(255, 107, 107, 0.2); filter: blur(100px);
            border-radius: 50%; animation: move 20s infinite alternate;
        }
        @keyframes move { from { transform: translate(-10%, -10%); } to { transform: translate(30%, 30%); } }

        .glass {
            background: rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 20px;
        }

        #map { height: 450px; width: 100%; border-radius: 20px; border: 4px solid white; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
        
        #formOverlay {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.4); z-index: 1000; justify-content: center; align-items: center;
        }
    </style>
</head>
<body>

    <div class="bg-animation"><div class="liquid"></div></div>

    <div class="max-w-6xl mx-auto p-4">
        <header class="flex flex-col md:flex-row justify-between items-center mb-6 gap-4">
            <div class="glass px-8 py-3">
                <h1 class="text-4xl font-bold text-red-600 tracking-tighter">BAKMAHA</h1>
            </div>
            <div class="glass px-4 py-2 flex items-center gap-2">
                <input type="text" id="listSearch" onkeyup="searchList()" placeholder="උත්සවයක් සොයන්න..." class="bg-transparent border-none outline-none text-gray-800 placeholder-gray-600 w-64">
                <span class="text-gray-500">🔍</span>
            </div>
        </header>

        <div class="mb-8">
            <div id="map"></div>
            <p class="text-center mt-2 text-red-700 font-bold">සිතියම මත Click කර අලුත් උත්සවයක් ඇතුළත් කරන්න 📍</p>
        </div>

        <h2 class="text-2xl font-bold text-gray-800 mb-4 px-2">ළඟම ඇති උත්සව ලැයිස්තුව</h2>
        <div id="eventList" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6 pb-20">
            </div>
    </div>

    <div id="formOverlay">
        <div class="glass p-8 w-[400px] flex flex-col gap-3 shadow-2xl relative">
            <h2 class="text-xl font-bold text-center text-gray-800 mb-2">උත්සව විස්තර ඇතුළත් කරන්න</h2>
            <input type="text" id="evName" placeholder="උත්සවයේ නම" class="p-3 rounded-lg bg-white/50 outline-none">
            <input type="text" id="evLoc" placeholder="ස්ථානය (ගම/නගරය)" class="p-3 rounded-lg bg-white/50 outline-none">
            <input type="text" id="evOrg" placeholder="සංවිධානය" class="p-3 rounded-lg bg-white/50 outline-none">
            <input type="date" id="evDate" class="p-3 rounded-lg bg-white/50 outline-none">
            <input type="file" id="evImg" accept="image/*" class="text-xs">
            
            <div class="flex gap-2 mt-2">
                <button onclick="saveData()" id="submitBtn" class="flex-1 bg-red-500 text-white py-3 rounded-lg font-bold">තොරතුරු තහවුරු කරන්න</button>
                <button onclick="closeForm()" class="bg-gray-400 text-white px-4 rounded-lg">X</button>
            </div>
        </div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://unpkg.com/leaflet-control-geocoder/dist/Control.Geocoder.js"></script>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
        import { getDatabase, ref, push, onChildAdded, remove, onChildRemoved } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-database.js";
        import { getStorage, ref as sRef, uploadBytes, getDownloadURL } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-storage.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDe2zWKPMaVKO4aAH0JGL688Bt8TV_4KcY",
            authDomain: "bakmaha.firebaseapp.com",
            projectId: "bakmaha",
            storageBucket: "bakmaha.firebasestorage.app",
            messagingSenderId: "351917609769",
            appId: "1:351917609769:web:4f1565d766f6efb2d29d38",
            measurementId: "G-44F7VVDBRD"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const storage = getStorage(app);
        const markersRef = ref(db, 'festivals');

        // Map Init
        var map = L.map('map').setView([7.8731, 80.7718], 8);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

        // Search Tool & GPS
        L.Control.geocoder().addTo(map);
        map.locate({setView: true, maxZoom: 13});

        let selectedLatLng = null;
        let activeMarkers = {};

        // Click to Open Form
        map.on('click', (e) => {
            selectedLatLng = e.latlng;
            document.getElementById('formOverlay').style.display = 'flex';
        });

        window.closeForm = () => { document.getElementById('formOverlay').style.display = 'none'; }

        // Save Data
        window.saveData = async () => {
            const btn = document.getElementById('submitBtn');
            const name = document.getElementById('evName').value;
            const loc = document.getElementById('evLoc').value;
            const org = document.getElementById('evOrg').value;
            const date = document.getElementById('evDate').value;
            const imgFile = document.getElementById('evImg').files[0];

            if(!name || !loc || !selectedLatLng) return alert("කරුණාකර විස්තර පුරවන්න");

            btn.disabled = true; btn.innerText = "මොහොතක් ඉන්න...";

            let url = "";
            if(imgFile) {
                const storageRef = sRef(storage, 'bakmaha/' + Date.now());
                const snap = await uploadBytes(storageRef, imgFile);
                url = await getDownloadURL(snap.ref);
            }

            await push(markersRef, { name, loc, org, date, lat: selectedLatLng.lat, lng: selectedLatLng.lng, url });
            
            btn.disabled = false; btn.innerText = "තොරතුරු තහවුරු කරන්න";
            closeForm();
        };

        // UI Rendering (Map + List)
        onChildAdded(markersRef, (snap) => {
            const data = snap.val();
            const key = snap.key;

            // 1. Add Marker to Map
            const marker = L.marker([data.lat, data.lng]).addTo(map);
            marker.bindPopup(`<b>${data.name}</b><br>${data.loc}`);
            activeMarkers[key] = marker;

            // 2. Add Card to List
            const list = document.getElementById('eventList');
            const card = document.createElement('div');
            card.id = "card-" + key;
            card.className = "glass p-4 flex flex-col gap-2 transition hover:scale-105 cursor-pointer event-card";
            card.innerHTML = `
                ${data.url ? `<img src="${data.url}" class="h-40 w-full object-cover rounded-lg">` : ''}
                <h3 class="font-bold text-xl text-red-600">${data.name}</h3>
                <p class="text-sm">📍 ${data.loc} | 🏢 ${data.org}</p>
                <p class="text-xs text-gray-500">📅 දිනය: ${data.date}</p>
                <div class="flex justify-between mt-2">
                    <button onclick="focusOnMap(${data.lat}, ${data.lng}, '${key}')" class="bg-orange-500 text-white px-3 py-1 rounded-md text-sm">සිතියමේ බලන්න</button>
                    <button onclick="deleteEvent('${key}')" class="text-red-500 font-bold">මකන්න</button>
                </div>
            `;
            list.prepend(card);
        });

        // Focus Map Function
        window.focusOnMap = (lat, lng, key) => {
            map.setView([lat, lng], 15);
            activeMarkers[key].openPopup();
            window.scrollTo({ top: 0, behavior: 'smooth' });
        };

        // Delete Function
        window.deleteEvent = (key) => {
            if(confirm("මෙම උත්සවය ඉවත් කිරීමට අවශ්‍යද?")) {
                remove(ref(db, 'festivals/' + key));
            }
        };

        onChildRemoved(markersRef, (snap) => {
            const key = snap.key;
            if(activeMarkers[key]) map.removeLayer(activeMarkers[key]);
            const card = document.getElementById("card-" + key);
            if(card) card.remove();
        });

        // Search List
        window.searchList = () => {
            let input = document.getElementById('listSearch').value.toLowerCase();
            let cards = document.getElementsByClassName('event-card');
            for (let i = 0; i < cards.length; i++) {
                cards[i].style.display = cards[i].innerText.toLowerCase().includes(input) ? "flex" : "none";
            }
        };
    </script>
</body>
</html>
