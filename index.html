<!DOCTYPE html>
<html lang="si">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BAKMAHA - අවුරුදු උත්සව තොරතුරු</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet-control-geocoder/dist/Control.Geocoder.css" />

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Abhaya+Libre:wght@400;700&display=swap');
        body { font-family: 'Abhaya Libre', serif; background: #fff5f5; margin: 0; }
        .glass { background: rgba(255, 255, 255, 0.3); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.4); border-radius: 20px; }
        #map { height: 350px; width: 100%; border-radius: 20px; border: 3px solid white; box-shadow: 0 5px 15px rgba(0,0,0,0.1); }
        .list-item { transition: 0.3s; cursor: pointer; }
        .list-item:hover { transform: scale(1.02); background: rgba(255, 255, 255, 0.5); }
    </style>
</head>
<body class="p-4 md:p-8">

    <div class="max-w-4xl mx-auto flex flex-col items-center gap-4 mb-8">
        <div class="w-32 h-32 glass flex items-center justify-center overflow-hidden border-2 border-red-400">
            <span class="text-red-500 font-bold">LOGO HERE</span>
        </div>
        <h1 class="text-4xl font-bold text-red-700 tracking-widest">BAKMAHA</h1>
    </div>

    <div class="max-w-4xl mx-auto grid grid-cols-1 gap-6">
        
        <div class="glass p-4">
            <h2 class="text-lg font-bold mb-2 text-gray-700">සිතියම (GPS/Search)</h2>
            <div id="map"></div>
        </div>

        <div class="glass p-6">
            <h2 class="text-xl font-bold mb-4 text-red-600">නව උත්සවයක් එක් කරන්න</h2>
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <input type="text" id="evName" placeholder="උත්සවයේ නම" class="p-3 rounded-lg bg-white/60 outline-none border border-red-200">
                <input type="text" id="evLoc" placeholder="ස්ථානය (ගම/නගරය)" class="p-3 rounded-lg bg-white/60 outline-none border border-red-200">
                <input type="text" id="evOrg" placeholder="සංවිධානය" class="p-3 rounded-lg bg-white/60 outline-none border border-red-200">
                <input type="date" id="evDate" class="p-3 rounded-lg bg-white/60 outline-none border border-red-200">
            </div>
            <p class="text-xs mt-2 text-gray-500 italic">*පළමුව සිතියම මත ස්ථානය ක්ලික් කර පසුව තහවුරු කරන්න.</p>
            <button onclick="saveData()" class="w-full mt-4 bg-red-600 text-white py-3 rounded-xl font-bold shadow-lg hover:bg-red-700 transition">තොරතුරු තහවුරු කරන්න</button>
        </div>

        <div class="glass p-6 mb-10">
            <h2 class="text-xl font-bold mb-4 text-gray-800">ලියාපදිංචි උත්සව ලැයිස්තුව</h2>
            <div id="festivalList" class="flex flex-col gap-3">
                <p id="noData" class="text-gray-500 text-center">තවම උත්සව ඇතුළත් කර නැත.</p>
            </div>
        </div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://unpkg.com/leaflet-control-geocoder/dist/Control.Geocoder.js"></script>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
        import { getDatabase, ref, push, onChildAdded, remove, onChildRemoved } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDe2zWKPMaVKO4aAH0JGL688Bt8TV_4KcY",
            authDomain: "bakmaha.firebaseapp.com",
            projectId: "bakmaha",
            storageBucket: "bakmaha.firebasestorage.app",
            messagingSenderId: "351917609769",
            appId: "1:351917609769:web:4f1565d766f6efb2d29d38",
            measurementId: "G-44F7VVDBRD"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const markersRef = ref(db, 'festivals');

        // Map Setup
        var map = L.map('map').setView([7.8731, 80.7718], 7);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

        // Search & GPS
        L.Control.geocoder().addTo(map);
        map.locate({setView: true, maxZoom: 10});

        let selectedLatLng = null;
        let activeMarkers = {};

        // සිතියම ක්ලික් කර ස්ථානය තෝරා ගැනීම
        map.on('click', (e) => {
            selectedLatLng = e.latlng;
            L.popup().setLatLng(e.latlng).setContent("ස්ථානය තෝරාගත්තා! දැන් විස්තර පුරවන්න.").openOn(map);
        });

        // Save Data
        window.saveData = function() {
            const name = document.getElementById('evName').value;
            const loc = document.getElementById('evLoc').value;
            const org = document.getElementById('evOrg').value;
            const date = document.getElementById('evDate').value;

            if(name && loc && org && date && selectedLatLng) {
                push(markersRef, {
                    name, location: loc, org, date,
                    lat: selectedLatLng.lat, lng: selectedLatLng.lng
                });
                alert("සාර්ථකව ඇතුළත් කළා!");
                // Clear fields
                document.getElementById('evName').value = "";
                document.getElementById('evLoc').value = "";
                document.getElementById('evOrg').value = "";
            } else {
                alert("කරුණාකර සිතියම මත ස්ථානයක් තෝරා සියලු විස්තර පුරවන්න.");
            }
        };

        // ලැයිස්තුවට සහ සිතියමට දත්ත එක් කිරීම (Real-time)
        onChildAdded(markersRef, (snapshot) => {
            const data = snapshot.val();
            const key = snapshot.key;
            document.getElementById('noData').style.display = 'none';

            // සිතියමට Marker එකක් දැමීම
            const marker = L.marker([data.lat, data.lng]).addTo(map)
                .bindPopup(`<b>${data.name}</b><br>${data.location}`);
            activeMarkers[key] = marker;

            // ලැයිස්තුවට එක් කිරීම
            const listContainer = document.getElementById('festivalList');
            const item = document.createElement('div');
            item.id = `item-${key}`;
            item.className = "list-item glass p-4 flex justify-between items-center border-l-4 border-red-500 shadow-sm";
            item.innerHTML = `
                <div onclick="focusMap(${data.lat}, ${data.lng}, '${key}')" class="flex-1">
                    <h3 class="font-bold text-red-700">${data.name}</h3>
                    <p class="text-sm text-gray-600">${data.location} | ${data.date}</p>
                    <p class="text-xs text-gray-500">සංවිධානය: ${data.org}</p>
                </div>
                <button onclick="deleteEntry('${key}')" class="bg-red-100 text-red-600 px-3 py-1 rounded-lg text-xs font-bold hover:bg-red-200">Delete</button>
            `;
            listContainer.prepend(item);
        });

        // List එක ක්ලික් කළ විට සිතියම එතැනට යාම
        window.focusMap = function(lat, lng, key) {
            map.setView([lat, lng], 14);
            activeMarkers[key].openPopup();
            window.scrollTo({ top: 0, behavior: 'smooth' });
        };

        // Delete Function
        window.deleteEntry = function(key) {
            if(confirm("මෙම උත්සවය ඉවත් කරනවාද?")) {
                remove(ref(db, 'festivals/' + key));
            }
        };

        onChildRemoved(markersRef, (snapshot) => {
            const key = snapshot.key;
            if (activeMarkers[key]) {
                map.removeLayer(activeMarkers[key]);
                delete activeMarkers[key];
            }
            document.getElementById(`item-${key}`).remove();
        });
    </script>
</body>
</html>
