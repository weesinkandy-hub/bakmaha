        <h1 class="text-4xl font-bold text-red-600">BAKMAHA</h1>
        <p class="text-gray-600 italic">සජීවී අලුත් අවුරුදු තොරතුරු පද්ධතිය</p>
    </div>

    <div class="max-w-4xl mx-auto grid grid-cols-1 gap-6">
        
        <div class="glass p-4 shadow-sm">
            <div id="map"></div>
            <p class="text-xs text-center text-gray-500">සිතියම මත ක්ලික් කර ස්ථානය තෝරන්න</p>
        </div>

        <div class="glass p-6 shadow-md border-t-4 border-red-500">
            <h2 class="text-xl font-bold mb-4 text-gray-800">නව උත්සවයක් එක් කරන්න</h2>
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <input type="text" id="evName" placeholder="උත්සවයේ නම" class="p-3 rounded-lg border focus:ring-2 ring-red-300 outline-none">
                <input type="text" id="evLoc" placeholder="ස්ථානය (ගම/නගරය)" class="p-3 rounded-lg border focus:ring-2 ring-red-300 outline-none">
                <input type="text" id="evOrg" placeholder="සංවිධානය" class="p-3 rounded-lg border focus:ring-2 ring-red-300 outline-none">
                <input type="date" id="evDate" class="p-3 rounded-lg border outline-none">
            </div>
            <button onclick="saveData()" id="submitBtn" class="w-full mt-4 bg-red-600 text-white py-3 rounded-lg font-bold hover:bg-red-700 transition duration-300 shadow-lg">
                තොරතුරු තහවුරු කරන්න (Quick Save)
            </button>
        </div>

        <div class="mt-4">
            <h2 class="text-2xl font-bold mb-4 text-gray-800 border-b-2 border-red-200 pb-2">ඉදිරි උත්සව ලැයිස්තුව</h2>
            <div id="festivalList" class="grid grid-cols-1 gap-4">
                <p id="emptyMsg" class="text-gray-400 italic text-center py-10">තවමත් උත්සව ඇතුළත් කර නොමැත...</p>
            </div>
        </div>

    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://unpkg.com/leaflet-control-geocoder/dist/Control.Geocoder.js"></script>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
        import { getDatabase, ref, push, onChildAdded, remove, onChildRemoved } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDe2zWKPMaVKO4aAH0JGL688Bt8TV_4KcY",
            authDomain: "bakmaha.firebaseapp.com",
            projectId: "bakmaha",
            storageBucket: "bakmaha.firebasestorage.app",
            messagingSenderId: "351917609769",
            appId: "1:351917609769:web:4f1565d766f6efb2d29d38",
            measurementId: "G-44F7VVDBRD"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const markersRef = ref(db, 'festivals');

        // Map Setup
        var map = L.map('map').setView([7.8731, 80.7718], 8);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
        L.Control.geocoder({ placeholder: "සිතියමේ ස්ථානය සොයන්න..." }).addTo(map);
        map.locate({setView: true, maxZoom: 13});

        let selectedPos = null;
        let tempMarker = null;

        // Click on Map
        map.on('click', (e) => {
            selectedPos = e.latlng;
            if(tempMarker) map.removeLayer(tempMarker);
            tempMarker = L.marker(selectedPos).addTo(map).bindPopup("මෙහි උත්සවය පවත්වයි").openPopup();
        });

        // Save Data
        window.saveData = function() {
            const name = document.getElementById('evName').value;
            const loc = document.getElementById('evLoc').value;
            const org = document.getElementById('evOrg').value;
            const date = document.getElementById('evDate').value;

            if(name && loc && org && date && selectedPos) {
                push(markersRef, {
                    name, location: loc, org, date,
                    lat: selectedPos.lat, lng: selectedPos.lng
                });
                // Reset inputs
                document.getElementById('evName').value = "";
                document.getElementById('evLoc').value = "";
                document.getElementById('evOrg').value = "";
                document.getElementById('evDate').value = "";
                if(tempMarker) map.removeLayer(tempMarker);
                alert("සාර්ථකව එකතු කළා!");
            } else {
                alert("කරුණාකර සිතියම මත ස්ථානයක් තෝරා සියලු විස්තර පුරවන්න.");
            }
        };

        // UI List Management
        const listDiv = document.getElementById('festivalList');
        const emptyMsg = document.getElementById('emptyMsg');
        let activeMarkers = {};

        onChildAdded(markersRef, (snap) => {
            emptyMsg.style.display = 'none';
            const data = snap.val();
            const id = snap.key;

            // සිතියමට මාකර් එක එක් කිරීම
            const marker = L.marker([data.lat, data.lng]).addTo(map)
                .bindPopup(`<b>${data.name}</b><br>${data.location}`);
            activeMarkers[id] = marker;

            // ලැයිස්තුවට Card එකක් එක් කිරීම
            const card = document.createElement('div');
            card.id = `card-${id}`;
            card.className = "festival-card glass p-4 flex justify-between items-center shadow-sm border-l-4 border-red-500";
            card.innerHTML = `
                <div>
                    <h3 class="font-bold text-lg text-red-700">${data.name}</h3>
                    <p class="text-sm text-gray-600">📍 ${data.location} | 📅 ${data.date}</p>
                    <p class="text-xs text-gray-500">සංවිධානය: ${data.org}</p>
                </div>
                <div class="flex gap-2">
                    <button onclick="focusMap(${data.lat}, ${data.lng})" class="bg-blue-500 text-white px-3 py-1 rounded text-sm">සිතියම බලන්න</button>
                    <button onclick="deleteEntry('${id}')" class="bg-red-100 text-red-600 px-3 py-1 rounded text-sm hover:bg-red-600 hover:text-white transition">මකන්න</button>
                </div>
            `;
            listDiv.prepend(card);
        });

        // Focus Map Function
        window.focusMap = function(lat, lng) {
            map.setView([lat, lng], 15);
            window.scrollTo(0,0);
        };

        // Delete Function
        window.deleteEntry = function(id) {
            if(confirm("මෙම උත්සවය මකා දැමීමට ඔබට සහතිකද?")) {
                remove(ref(db, 'festivals/' + id));
            }
        };

        onChildRemoved(markersRef, (snap) => {
            const id = snap.key;
            const card = document.getElementById(`card-${id}`);
            if(card) card.remove();
            if(activeMarkers[id]) map.removeLayer(activeMarkers[id]);
            if(listDiv.children.length === 1) emptyMsg.style.display = 'block';
        });

    </script>
</body>
</html>
